name: GoondVR Continuous Runner

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix_jobs: ${{ steps.generate_matrix.outputs.matrix_jobs }}
      session_id: ${{ steps.generate_session.outputs.session_id }}
      channels: ${{ steps.validate.outputs.resolved_channels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Validate inputs
        id: validate
        run: |
          # Read channels from .github/workflows/channels.txt
          if [ -f ".github/workflows/channels.txt" ]; then
            echo "Reading channels from .github/workflows/channels.txt..."
            # Read non-empty lines that don't start with # and join with commas
            CHANNELS_LIST=$(grep -v '^[[:space:]]*#' .github/workflows/channels.txt | grep -v '^[[:space:]]*$' | tr -d '\r' | paste -sd "," -)
          fi
          
          if [ -z "$CHANNELS_LIST" ]; then
            echo "Error: No channels found in .github/workflows/channels.txt"
            echo "Please add channels to .github/workflows/channels.txt"
            exit 1
          fi
          
          # Count number of channels
          CHANNEL_COUNT=$(echo "$CHANNELS_LIST" | tr ',' '\n' | wc -l)
          
          # Set matrix count to match channel count (max 20)
          if [ "$CHANNEL_COUNT" -gt 20 ]; then
            echo "Warning: Found $CHANNEL_COUNT channels, limiting to 20 (GitHub Actions max)"
            MATRIX_COUNT=20
          else
            MATRIX_COUNT=$CHANNEL_COUNT
          fi
          
          echo "✅ Validation passed: $MATRIX_COUNT matrix jobs for $CHANNEL_COUNT channels"
          echo "Channels: $CHANNELS_LIST"
          echo "validated_matrix_count=$MATRIX_COUNT" >> $GITHUB_OUTPUT
          echo "resolved_channels=$CHANNELS_LIST" >> $GITHUB_OUTPUT
      
      - name: Generate session ID
        id: generate_session
        run: |
          # Generate unique session ID using run ID and timestamp
          SESSION_ID="run-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "Generated session ID: $SESSION_ID"
      
      - name: Generate matrix configuration
        id: generate_matrix
        run: |
          # Generate matrix job IDs based on validated matrix_job_count
          MATRIX_COUNT="${{ steps.validate.outputs.validated_matrix_count }}"
          MATRIX_JOBS=$(seq 1 $MATRIX_COUNT | jq -R . | jq -s -c .)
          echo "matrix_jobs=$MATRIX_JOBS" >> $GITHUB_OUTPUT
          echo "Generated matrix jobs: $MATRIX_JOBS"

  record:
    name: Record (Job ${{ matrix.job_id }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 hours (5 hours 30 minutes)
    strategy:
      matrix:
        job_id: ${{ fromJson(needs.validate.outputs.matrix_jobs) }}
      fail-fast: false  # Continue other jobs even if one fails
      max-parallel: 20  # Allow up to 20 concurrent jobs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Cache Compression Strategy:
      # - Uses zstd compression with level 19 (maximum without --ultra flag)
      # - Compression level 19 can reduce cache size by up to 10x compared to default
      # - This maximizes the effective use of GitHub's 10 GB cache limit
      # - Higher compression levels (20-22) require --ultra flag and are not supported
      # - Compression is applied to both restore and save operations for consistency
      
      - name: Restore shared configuration cache
        uses: actions/cache/restore@v4
        id: restore_shared_config
        env:
          ZSTD_CLEVEL: 19  # Maximum compression level for zstd (1-19)
        with:
          path: |
            ./conf
          key: shared-config-latest
          restore-keys: |
            shared-config-
      
      - name: Restore job-specific state cache
        uses: actions/cache/restore@v4
        id: restore_job_state
        env:
          ZSTD_CLEVEL: 19  # Maximum compression level for zstd (1-19)
        with:
          path: |
            ./videos
            ./state
            ./partial
          key: state-${{ needs.validate.outputs.session_id }}-job-${{ matrix.job_id }}
          restore-keys: |
            state-latest-job-${{ matrix.job_id }}
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      
      - name: Install dependencies
        run: |
          go mod download
          echo "Dependencies installed successfully"
      
      - name: Initialize state
        run: |
          # Create necessary directories
          mkdir -p ./conf ./videos ./state ./partial ./database
          
          # Log cache restoration status
          echo "Shared config cache hit: ${{ steps.restore_shared_config.outputs.cache-hit }}"
          echo "Job state cache hit: ${{ steps.restore_job_state.outputs.cache-hit }}"
          
          # If no cache hit, initialize with defaults
          if [ "${{ steps.restore_shared_config.outputs.cache-hit }}" != "true" ]; then
            echo "No shared config cache found, will initialize with defaults"
          fi
          
          if [ "${{ steps.restore_job_state.outputs.cache-hit }}" != "true" ]; then
            echo "No job state cache found, starting fresh"
          fi
      
      - name: Start recording
        env:
          GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
          FILESTER_API_KEY: ${{ secrets.FILESTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          MATRIX_JOB_ID: ${{ matrix.job_id }}
          MATRIX_JOB_COUNT: ${{ steps.validate.outputs.validated_matrix_count }}
          SESSION_ID: ${{ needs.validate.outputs.session_id }}
          CHANNELS: ${{ needs.validate.outputs.channels }}
          COST_SAVING: false
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "Starting GoondVR in GitHub Actions mode"
          echo "Session ID: $SESSION_ID"
          echo "Matrix Job ID: $MATRIX_JOB_ID"
          echo "Channels: $CHANNELS"
          
          # TODO: Implement GitHub Actions mode in main.go
          # This will be implemented in subsequent tasks
          # go run main.go \
          #   --mode github-actions \
          #   --matrix-job-id $MATRIX_JOB_ID \
          #   --session-id $SESSION_ID \
          #   --channels "$CHANNELS" \
          #   --max-quality \
          #   --cost-saving=$COST_SAVING
          
          echo "Recording mode not yet implemented - placeholder for Task 1"
          echo "Workflow infrastructure is ready for implementation"
      
      - name: Save shared configuration cache
        if: always()
        uses: actions/cache/save@v4
        env:
          ZSTD_CLEVEL: 19  # Maximum compression level for zstd (1-19)
        with:
          path: |
            ./conf
          key: shared-config-latest
      
      - name: Save job-specific state cache
        if: always()
        uses: actions/cache/save@v4
        env:
          ZSTD_CLEVEL: 19  # Maximum compression level for zstd (1-19)
        with:
          path: |
            ./videos
            ./state
            ./partial
          key: state-${{ needs.validate.outputs.session_id }}-job-${{ matrix.job_id }}
      
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-job-${{ matrix.job_id }}-${{ github.run_id }}
          path: |
            ./videos/**/*
            ./state/**/*
            ./logs/**/*
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Update status file
        if: always()
        run: |
          # Create status directory if it doesn't exist
          mkdir -p ./status
          
          # Generate status file with current job information
          cat > ./status/job-${{ matrix.job_id }}.json << EOF
          {
            "job_id": "${{ matrix.job_id }}",
            "session_id": "${{ needs.validate.outputs.session_id }}",
            "run_id": "${{ github.run_id }}",
            "status": "${{ job.status }}",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runner": "${{ runner.os }}"
          }
          EOF
          
          echo "Status file created for job ${{ matrix.job_id }}"

  summary:
    name: Workflow Summary
    needs: [validate, record]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## GoondVR Continuous Runner Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Session ID:** ${{ needs.validate.outputs.session_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Matrix Jobs:** ${{ needs.validate.outputs.validated_matrix_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channels:** ${{ needs.validate.outputs.channels }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.record.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### System Features" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Maximum quality enabled (up to 4K 60fps)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dual upload to Gofile and Filester" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Auto-restart every 5.5 hours" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ State persistence across runs" >> $GITHUB_STEP_SUMMARY
